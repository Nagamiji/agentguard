# Install with: make hooks   (needs the commit-msg and pre-push stages too)
default_install_hook_types: [pre-commit, commit-msg, pre-push]

repos:
  - repo: local
    hooks:
      - id: conventional-commit
        name: Conventional Commit message
        entry: .github/scripts/check-commit-msg.sh
        language: script
        stages: [commit-msg]

      # Stands in for GitHub branch protection, which a private repo cannot enforce
      # without a paid plan. See docs/branch-protection.md.
      - id: no-direct-push-to-main
        name: Block direct push to main
        entry: .github/scripts/pre-push-guard.sh
        language: script
        stages: [pre-push]
        always_run: true
        pass_filenames: false

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21  # keep in lockstep with the ruff version in the venv / CI
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
