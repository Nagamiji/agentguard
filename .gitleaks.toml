# Gitleaks config — extends the default ruleset, which stays fully active.
# Picked up automatically by the gitleaks binary and gitleaks-action (ci.yml, security.yml).

[extend]
useDefault = true

# The docs show curl examples with obviously-fake bearer tokens. AND-scoped to the
# placeholder values so a real key pasted into docs still gets caught.
[[allowlists]]
description = "Documentation placeholder credentials, not real secrets"
condition = "AND"
paths = ['''docs/.*\.md''']
regexes = ['''ag_(your_key_here|admin_key)''']
