# Local dev stack for the [NOW] slice: Postgres (pgvector) + Redis.
# `make up` starts these; the app/worker run on the host against them.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: keel
      POSTGRES_PASSWORD: keel
      POSTGRES_DB: keel
    # Published on 5433: dev machines commonly run a native Postgres on 5432,
    # whose loopback binding silently wins over Docker's — you end up talking to
    # the wrong database. 5433 makes the local stack unambiguous.
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Creates the least-privilege keel_app role (superusers bypass RLS — see the SQL).
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keel"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
