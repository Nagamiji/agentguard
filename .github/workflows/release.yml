# Runs after a merge to `main`, once CI on `main` is green, and produces the deployment
# artifact for that commit.
#
# workflow_run (not `push: main`) is deliberate: it starts only after the CI run for the
# same commit CONCLUDES SUCCESSFULLY, so a red `main` can never yield a release artifact.
# `push` would race CI and happily build one anyway.
name: Release

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  artifact:
    name: Build deployment artifact
    runs-on: ubuntu-latest
    # workflow_dispatch has no upstream run to inspect; only gate the automatic path.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          # Build the exact commit CI validated, not whatever main has drifted to since.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve version
        id: meta
        run: |
          SHA="$(git rev-parse HEAD)"
          VERSION="$(python -c "import re,pathlib;print(re.search(r'^version = \"([^\"]+)\"', pathlib.Path('pyproject.toml').read_text(), re.M).group(1))")"
          echo "sha=$SHA"                  >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHA:0:7}"      >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"          >> "$GITHUB_OUTPUT"
          echo "tag=$VERSION-${SHA:0:7}"   >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: keel-platform:${{ steps.meta.outputs.tag }}
          cache-from: type=gha

      - name: Export image + manifest
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          SHA: ${{ steps.meta.outputs.sha }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          mkdir -p dist
          docker save "keel-platform:${TAG}" | gzip > "dist/keel-platform-${TAG}.tar.gz"
          # Reproducibility is day-one: the artifact records exactly what it came from.
          cat > dist/manifest.json <<EOF
          {
            "name": "keel-platform",
            "version": "${VERSION}",
            "tag": "${TAG}",
            "commit": "${SHA}",
            "built_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "workflow_run": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "image_digest": "$(docker image inspect "keel-platform:${TAG}" --format '{{index .Id}}')"
          }
          EOF
          sha256sum "dist/keel-platform-${TAG}.tar.gz" > "dist/keel-platform-${TAG}.tar.gz.sha256"
          cat dist/manifest.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: keel-platform-${{ steps.meta.outputs.tag }}
          path: dist/
          retention-days: 30
          if-no-files-found: error

      - name: Create Git Tag and GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ steps.meta.outputs.version }}
          SHA: ${{ steps.meta.outputs.sha }}
          FILE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Use short sha extension if tag exists to avoid conflicts
          FINAL_TAG="$TAG"
          if git rev-parse "$FINAL_TAG" >/dev/null 2>&1; then
            FINAL_TAG="$TAG-${SHA:0:7}"
          fi

          # Tag and push
          git tag "$FINAL_TAG" "$SHA"
          git push origin "$FINAL_TAG"

          # Create Release
          gh release create "$FINAL_TAG" \
            "dist/keel-platform-$FILE_TAG.tar.gz" \
            "dist/keel-platform-$FILE_TAG.tar.gz.sha256" \
            --title "Release $FINAL_TAG" \
            --notes "Automated release of $FINAL_TAG from commit $SHA" \
            --target "$SHA"

      - name: Summary
        run: |
          {
            echo "### Deployment artifact ready"
            echo ""
            echo "- **tag**: \`${{ steps.meta.outputs.tag }}\`"
            echo "- **commit**: \`${{ steps.meta.outputs.sha }}\`"
            echo ""
            echo "Deployment itself is a separate, human-initiated step (see CLAUDE.md)."
          } >> "$GITHUB_STEP_SUMMARY"
