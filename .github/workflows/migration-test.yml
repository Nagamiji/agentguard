name: Migration Test

# Run on every PR and push to main — migrations breaking = hard blocker.
on:
  pull_request:
  push:
    branches: [main]
  merge_group:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  migration-roundtrip:
    name: Migration round-trip (upgrade → downgrade → upgrade)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: keel
          POSTGRES_PASSWORD: keel
          POSTGRES_DB: keel
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U keel" --health-interval 5s
          --health-timeout 3s --health-retries 10

    env:
      KEEL_DATABASE_URL: postgresql+psycopg://keel_app:keel_app@localhost:5432/keel
      KEEL_MIGRATION_DATABASE_URL: postgresql+psycopg://keel:keel@localhost:5432/keel
      KEEL_REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Create least-privilege app role
        run: |
          PGPASSWORD=keel psql -h localhost -U keel -d keel \
            -c "CREATE ROLE keel_app LOGIN PASSWORD 'keel_app';" \
            -c "GRANT USAGE ON SCHEMA public TO keel_app;"

      - name: Upgrade to head
        run: alembic upgrade head

      - name: Downgrade to base
        run: alembic downgrade base

      - name: Re-upgrade to head (verify idempotence)
        run: alembic upgrade head

      - name: Run full integration tests against migrated schema
        env:
          KEEL_REQUIRE_DB: "1"
        run: pytest -rs
