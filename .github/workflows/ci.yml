name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check src tests
      - name: Typecheck (mypy)
        run: mypy src
      - name: Test (pytest)
        run: pytest

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # [SEED+] terraform job activates when infrastructure/terraform has live .tf:
  # fmt -> validate -> tfsec/checkov -> plan (comment) -> human approval -> apply.
  # Kept disabled until PLAT-01 lands to avoid failing on an empty module.
